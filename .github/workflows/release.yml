name: Release and Publish NuGet Package

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
    branches:
      - main

env:
#   DOTNET_VERSION_8: '8.0.x'
#   DOTNET_VERSION_10: '10.0.x'
  CONFIGURATION: 'Release'
  PROJECT_PATH: 'src/Rufus/Rufus.csproj'

jobs:
  release:
#     name: Build, Test, and Publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Extract version from tag
      id: get_version
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        echo "version=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "📦 Release version: $TAG_NAME"

    - name: Validate version format
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"
        if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Error: Tag must be in format X.Y.Z (e.g., 1.0.0)"
          exit 1
        fi
        echo "✅ Version format is valid: $VERSION"

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          '8.0.x'
          '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Run tests
      run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

    - name: Pack NuGet package
      run: |
        dotnet pack ${{ env.PROJECT_PATH }} \
          --configuration ${{ env.CONFIGURATION }} \
          --no-build \
          --output ./artifacts \
          /p:PackageVersion=${{ steps.get_version.outputs.version }} \
          /p:Version=${{ steps.get_version.outputs.version }}

    - name: Display package info
      run: |
        echo "📦 Package created:"
        ls -lh ./artifacts/
        echo ""
        echo "Package version: ${{ steps.get_version.outputs.version }}"

    - name: Publish to NuGet.org (Trusted Publishing)
      run: |
        echo "🚀 Publishing to NuGet.org using Trusted Publishing..."
        dotnet nuget push ./artifacts/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
        echo "✅ Published to NuGet.org"

    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        release_name: Release ${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
