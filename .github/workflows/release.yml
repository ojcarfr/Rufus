name: Release and Publish NuGet Package

on:
  push:
    branches:
      - main
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CONFIGURATION: 'Release'
  PROJECT_PATH: 'src/Rufus/Rufus.csproj'

jobs:
  build:
    name: Pack and Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check if valid version tag
      id: version_check
      run: |
        if [[ $GITHUB_REF =~ ^refs/tags/v?([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
          VERSION="${BASH_REMATCH[1]}"
          echo "is_version_tag=true" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Valid version tag detected: $VERSION"
        else
          echo "is_version_tag=false" >> $GITHUB_OUTPUT
          echo "ℹ️ Not a version tag, will only build and test"
        fi

    - name: Setup dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: | 
          8.0.x
          9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

    - name: Run tests
      run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal

    - name: Pack NuGet package
      if: steps.version_check.outputs.is_version_tag == 'true'
      run: |
        dotnet pack ${{ env.PROJECT_PATH }} \
          --configuration ${{ env.CONFIGURATION }} \
          --no-build \
          --output ./artifacts \
          /p:PackageVersion=${{ steps.version_check.outputs.version }} \
          /p:Version=${{ steps.version_check.outputs.version }}

    - name: Display package info
      if: steps.version_check.outputs.is_version_tag == 'true'
      run: |
        echo "📦 Package created:"
        ls -lh ./artifacts/
        echo ""
        echo "Package version: ${{ steps.version_check.outputs.version }}"

    # Get a short-lived NuGet API key using OIDC
    - name: NuGet login (OIDC → temp API key)
      uses: Nuget/login@v1
      id: login
      if: steps.version_check.outputs.is_version_tag == 'true'
      with:
        user: ${{ secrets.NUGET_USERNAME }}

    # Push the package
    - name: NuGet push
      if: steps.version_check.outputs.is_version_tag == 'true'
      run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json --skip-duplicate
