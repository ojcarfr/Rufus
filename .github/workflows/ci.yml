name: CI

on:
    push:
        branches: [ main, master ]
        tags: [ 'v*' ]
    pull_request:
        branches: [ main, master ]

jobs:
    build-and-test:
        name: Build and Test
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: '10.0.x'

            -   name: Restore
                run: dotnet restore

            -   name: Build
                run: dotnet build --configuration Release --no-restore

            -   name: Test
                run: dotnet test --project test/Rufus.Tests/Rufus.Tests.csproj --configuration Release --no-build --verbosity normal

    pack-and-publish:
        name: Pack and Publish
        needs: build-and-test
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout (full history)
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0

            -   name: Setup .NET SDK
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: '10.0.x'

            -   name: Determine version from tag
                id: version
                run: |
                    echo "Found ref: $GITHUB_REF"
                    # strip leading refs/tags/v
                    VERSION=${GITHUB_REF#refs/tags/v}
                    echo "version=$VERSION" >> $GITHUB_OUTPUT

            -   name: Pack
                run: dotnet pack src/Rufus/Rufus.csproj -c Release -o ./artifacts /p:PackageVersion=${{ steps.version.outputs.version }}

            -   name: Publish to NuGet.org
                env:
                    NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
                run: |
                    echo "Pushing packages from ./artifacts"
                    dotnet nuget push ./artifacts/*.nupkg -k $NUGET_API_KEY -s https://api.nuget.org/v3/index.json --skip-duplicate

